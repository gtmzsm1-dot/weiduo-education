<head>

<!-- AI Workshop code (deferred to admin login) -->
<script type="text/template" id="workshop-code">
// ===== AI提分工坊（P1-1） =====
function aiWorkshopNow(){ return new Date().toISOString(); }
function aiWorkshopGenId(prefix='aiw'){ return `${prefix}_${Date.now()}_${Math.random().toString(36).slice(2,6)}`; }
function aiWorkshopEscapeHtml(value){
  return String(value === undefined || value === null ? '' : value)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}
function aiWorkshopToNumber(v){
  if(v === '' || v === null || v === undefined) return '';
  const n = Number(v);
  return Number.isNaN(n) ? '' : n;
}
function aiWorkshopNormalizeStudent(raw){
  const now = aiWorkshopNow();
  const s = Object.assign({
    id: aiWorkshopGenId('stu'),
    name: '',
    grade: '高一',
    examDirection: '高考',
    currentScore: '',
    targetScore: '',
    studentLevel: AI_WORKSHOP_LEVELS[0],
    weakModules: '',
    currentFocus: '',
    notes: '',
    createdAt: now,
    updatedAt: now
  }, raw || {});
  s.examDirection = '高考';
  s.currentScore = aiWorkshopToNumber(s.currentScore);
  s.targetScore = aiWorkshopToNumber(s.targetScore);
  return s;
}
function aiWorkshopNormalizeQuiz(raw){
  const now = aiWorkshopNow();
  const q = Object.assign({
    id: aiWorkshopGenId('quiz'),
    studentId: '',
    title: '',
    grade: '高一',
    examDirection: '高考',
    knowledgeModule: '',
    knowledgePoint: '',
    studentLevel: AI_WORKSHOP_LEVELS[0],
    questionCount: 0,
    questionTypeMix: { fillBlank: 0, solution: 0 },
    difficultyMix: { basic: 0, medium: 0, advanced: 0, challenge: 0 },
    status: '草稿',
    notes: '',
    createdAt: now,
    updatedAt: now
  }, raw || {});
  q.examDirection = '高考';
  q.questionCount = Number(q.questionCount) || 0;
  q.questionTypeMix = Object.assign({ fillBlank: 0, solution: 0 }, q.questionTypeMix || {});
  q.difficultyMix = Object.assign({ basic: 0, medium: 0, advanced: 0, challenge: 0 }, q.difficultyMix || {});
  return q;
}
function aiWorkshopNormalizeQuestion(raw){
  const now = aiWorkshopNow();
  const q = Object.assign({
    id: aiWorkshopGenId('q'),
    quizId: '',
    questionNumber: 1,
    questionType: '填空题',
    questionText: '',
    latexContent: '',
    standardAnswer: '',
    explanation: '',
    knowledgeModule: '',
    knowledgePoint: '',
    difficulty: '基础',
    diagnosticPurpose: '',
    testedAbility: '',
    commonMistakeTags: [],
    score: 0,
    order: 1,
    questionImageData: '',
    questionImageUrl: '',
    aiRecognizedQuestion: '',
    aiRecognitionStatus: '未识别',
    aiConfidence: '',
    teacherConfirmedQuestion: '',
    createdAt: now,
    updatedAt: now
  }, raw || {});
  q.commonMistakeTags = Array.isArray(q.commonMistakeTags) ? q.commonMistakeTags.map(x=>String(x).trim()).filter(Boolean) : [];
  q.score = Number(q.score) || 0;
  q.order = Number(q.order) || 1;
  q.questionNumber = Number(q.questionNumber) || 1;
  return q;
}
function aiWorkshopNormalizeAnswer(raw){
  const now = aiWorkshopNow();
  const a = Object.assign({
    id: aiWorkshopGenId('ans'),
    studentId: '',
    quizId: '',
    questionId: '',
    studentAnswerText: '',
    studentAnswerImageData: '',
    studentAnswerImageName: '',
    result: '待确认',
    score: '',
    teacherComment: '',
    mistakeTags: [],
    aiRecognizedAnswer: '',
    aiJudgment: '',
    aiErrorStep: '',
    aiMistakeTags: [],
    aiDiagnosis: '',
    aiStatus: '未识别',
    createdAt: now,
    updatedAt: now
  }, raw || {});
  a.mistakeTags = Array.isArray(a.mistakeTags) ? a.mistakeTags.map(x=>String(x).trim()).filter(Boolean) : [];
  a.aiMistakeTags = Array.isArray(a.aiMistakeTags) ? a.aiMistakeTags.map(x=>String(x).trim()).filter(Boolean) : [];
  if(a.score !== '') a.score = Number(a.score) || 0;
  return a;
}
function aiWorkshopLoadData(){
  try{
    const studentsRaw = JSON.parse(localStorage.getItem(AI_WORKSHOP_STUDENTS_KEY) || '[]');
    aiWorkshopStudents = (Array.isArray(studentsRaw) ? studentsRaw : []).map(aiWorkshopNormalizeStudent);
  }catch(e){ aiWorkshopStudents = []; }
  try{
    const quizzesRaw = JSON.parse(localStorage.getItem(AI_WORKSHOP_QUIZZES_KEY) || '[]');
    aiWorkshopQuizzes = (Array.isArray(quizzesRaw) ? quizzesRaw : []).map(aiWorkshopNormalizeQuiz);
  }catch(e){ aiWorkshopQuizzes = []; }
  try{
    const questionsRaw = JSON.parse(localStorage.getItem(AI_WORKSHOP_QUESTIONS_KEY) || '[]');
    aiWorkshopQuestions = (Array.isArray(questionsRaw) ? questionsRaw : []).map(aiWorkshopNormalizeQuestion);
  }catch(e){ aiWorkshopQuestions = []; }
  try{
    const answersRaw = JSON.parse(localStorage.getItem(AI_WORKSHOP_ANSWERS_KEY) || '[]');
    aiWorkshopAnswers = (Array.isArray(answersRaw) ? answersRaw : []).map(aiWorkshopNormalizeAnswer);
  }catch(e){ aiWorkshopAnswers = []; }
  aiWorkshopSaveMeta();
}
function aiWorkshopSaveMeta(){
  safeSetItem(AI_WORKSHOP_META_KEY, JSON.stringify({ version:'v1-p1', updatedAt: aiWorkshopNow() }), { silent: true, description: '工坊元数据' });
}
function saveAiWorkshopStudents(){
  safeSetItem(AI_WORKSHOP_STUDENTS_KEY, JSON.stringify(aiWorkshopStudents), { silent: true, description: '工坊学生列表' });
  aiWorkshopSaveMeta();
}
function saveAiWorkshopQuizzes(){
  safeSetItem(AI_WORKSHOP_QUIZZES_KEY, JSON.stringify(aiWorkshopQuizzes), { silent: true, description: '工坊小测列表' });
  aiWorkshopSaveMeta();
}
function saveAiWorkshopQuestions(){
  safeSetItem(AI_WORKSHOP_QUESTIONS_KEY, JSON.stringify(aiWorkshopQuestions), { silent: true, description: '工坊题目列表' });
  aiWorkshopSaveMeta();
}
function saveAiWorkshopAnswers(){
  safeSetItem(AI_WORKSHOP_ANSWERS_KEY, JSON.stringify(aiWorkshopAnswers), { silent: true, description: '工坊作答记录' });
  aiWorkshopSaveMeta();
}
function aiWorkshopGetQuestionsByQuizId(quizId){
  return aiWorkshopQuestions.filter(q=>q.quizId===quizId).sort((a,b)=>(Number(a.order)||0)-(Number(b.order)||0) || new Date(a.createdAt)-new Date(b.createdAt));
}
function aiWorkshopReindexQuestions(quizId){
  const list = aiWorkshopGetQuestionsByQuizId(quizId);
  list.forEach((q,idx)=>{
    q.order = idx + 1;
    q.questionNumber = idx + 1;
  });
}
function aiWorkshopUpdateQuizQuestionCount(quizId){
  const quiz = aiWorkshopQuizzes.find(q=>q.id===quizId);
  if(!quiz) return;
  quiz.questionCount = aiWorkshopQuestions.filter(q=>q.quizId===quizId).length;
  quiz.updatedAt = aiWorkshopNow();
}
function aiWorkshopDeleteQuestionsByQuizId(quizId){
  aiWorkshopQuestions = aiWorkshopQuestions.filter(q=>q.quizId!==quizId);
}
function aiWorkshopSyncAllQuizQuestionCounts(){
  aiWorkshopQuizzes.forEach(quiz=>{
    quiz.questionCount = aiWorkshopQuestions.filter(q=>q.quizId===quiz.id).length;
  });
}
function aiWorkshopFormatQuestionSummary(text){
  const raw = String(text || '').trim();
  if(!raw) return '（无题干）';
  return raw.length > 28 ? raw.slice(0, 28) + '…' : raw;
}
function aiWorkshopParseMistakeTags(input){
  if(Array.isArray(input)) return input.map(x=>String(x).trim()).filter(Boolean);
  return String(input || '')
    .split(/[,，、\n]/g)
    .map(x=>x.trim())
    .filter(Boolean);
}
function aiWorkshopMoveQuestion(questionId, direction){
  const q = aiWorkshopQuestions.find(x=>x.id===questionId);
  if(!q) return;
  const list = aiWorkshopGetQuestionsByQuizId(q.quizId);
  const idx = list.findIndex(x=>x.id===questionId);
  if(idx < 0) return;
  const targetIdx = direction === 'up' ? idx - 1 : idx + 1;
  if(targetIdx < 0 || targetIdx >= list.length) return;
  const current = list[idx];
  const target = list[targetIdx];
  const currentOrder = current.order;
  current.order = target.order;
  target.order = currentOrder;
  current.updatedAt = aiWorkshopNow();
  target.updatedAt = aiWorkshopNow();
  aiWorkshopReindexQuestions(q.quizId);
  saveAiWorkshopQuestions();
  renderAiWorkshopQuizQuestions(q.quizId);
}
function aiWorkshopGetPrintModeLabel(mode){
  return mode === 'teacher' ? '教师批改版' : '学生作答版';
}
function aiWorkshopGetAnswer(studentId, quizId, questionId){
  return aiWorkshopAnswers.find(a=>a.studentId===studentId && a.quizId===quizId && a.questionId===questionId);
}
function aiWorkshopDefaultScoreByResult(result, maxScore){
  if(result === '正确') return maxScore;
  if(result === '错误' || result === '未作答') return 0;
  return '';
}
function aiWorkshopComputeQuizStats(studentId, quizId){
  const questions = aiWorkshopGetQuestionsByQuizId(quizId);
  const stats = {
    total: questions.length, graded:0, correct:0, wrong:0, half:0, empty:0, pending:0, totalScore:0, fullScore:0,
    byType:{}, byDifficulty:{}, byModule:{}, byPoint:{}, tagFreq:{}, topIssues:[]
  };
  questions.forEach(q=>{
    const ans = aiWorkshopGetAnswer(studentId, quizId, q.id);
    const result = ans ? ans.result : '待确认';
    stats.fullScore += Number(q.score) || 0;
    if(ans) stats.graded++;
    if(result==='正确') stats.correct++;
    else if(result==='错误') stats.wrong++;
    else if(result==='半对') stats.half++;
    else if(result==='未作答') stats.empty++;
    else stats.pending++;
    const score = ans && ans.score!=='' ? Number(ans.score)||0 : 0;
    stats.totalScore += score;
    const add = (bucket,key,val)=>{ if(!bucket[key]) bucket[key]={total:0,correct:0,score:0}; bucket[key].total++; bucket[key].score += score; if(result==='正确') bucket[key].correct++; };
    add(stats.byType, q.questionType || '未知', score);
    add(stats.byDifficulty, q.difficulty || '未知', score);
    add(stats.byModule, q.knowledgeModule || '未分类', score);
    add(stats.byPoint, q.knowledgePoint || '未分类', score);
    (ans?.mistakeTags || []).forEach(tag=>{ stats.tagFreq[tag]=(stats.tagFreq[tag]||0)+1; });
  });
  const topTagIssues = Object.entries(stats.tagFreq).sort((a,b)=>b[1]-a[1]).slice(0,3).map(([k,v])=>`${k}（${v}次）`);
  const weakPoints = Object.entries(stats.byPoint)
    .map(([k,v])=>({k,rate:v.total? v.correct/v.total : 0}))
    .sort((a,b)=>a.rate-b.rate)
    .slice(0,3)
    .map(it=>`${it.k}（正确率${Math.round(it.rate*100)}%）`);
  stats.topIssues = [...topTagIssues];
  weakPoints.forEach(item=>{ if(stats.topIssues.length<3 && !stats.topIssues.includes(item)) stats.topIssues.push(item); });
  return stats;
}
function aiWorkshopGetBackupPayload(){
  return {
    exportedAt: aiWorkshopNow(),
    version: 'v1-p1',
    source: 'AI提分工坊',
    data: {
      meta: JSON.parse(localStorage.getItem(AI_WORKSHOP_META_KEY) || '{}'),
      students: aiWorkshopStudents,
      quizzes: aiWorkshopQuizzes,
      questions: aiWorkshopQuestions,
      answers: aiWorkshopAnswers
    }
  };
}
function aiWorkshopFormatSizeFromChars(chars){
  const bytes = chars * 2;
  if(bytes < 1024) return `${bytes} B`;
  if(bytes < 1024 * 1024) return `${(bytes/1024).toFixed(1)} KB`;
  return `${(bytes/1024/1024).toFixed(2)} MB`;
}
function aiWorkshopEstimateStorage(){
  const keys = [AI_WORKSHOP_META_KEY, AI_WORKSHOP_STUDENTS_KEY, AI_WORKSHOP_QUIZZES_KEY, AI_WORKSHOP_QUESTIONS_KEY, AI_WORKSHOP_ANSWERS_KEY];
  const detail = keys.map(k=>{
    const value = localStorage.getItem(k) || '';
    return {key:k, chars:value.length};
  });
  const totalChars = detail.reduce((sum,it)=>sum+it.chars,0);
  const imageChars = aiWorkshopAnswers.reduce((sum,a)=>sum + String(a.studentAnswerImageData || '').length, 0);
  const imageCount = aiWorkshopAnswers.filter(a=>a.studentAnswerImageData).length;
  return {detail,totalChars,imageChars,imageCount};
}
function aiWorkshopExportBackup(){
  const backup = aiWorkshopGetBackupPayload();
  const blob = new Blob([JSON.stringify(backup, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const d = new Date();
  const pad = n => String(n).padStart(2,'0');
  const filename = `ai-workshop-backup-${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}-${pad(d.getHours())}${pad(d.getMinutes())}.json`;
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  a.click();
  URL.revokeObjectURL(url);
  showToast('工坊数据导出成功');
}
function aiWorkshopShowImportModal(){
  showModal(`
    <h3>导入工坊数据（替换全部）</h3>
    <div class="form-group"><label>选择 JSON 备份文件</label><input type="file" id="aiwImportFile" accept=".json,application/json" onchange="aiWorkshopHandleImportBackup(event)"></div>
    <div id="aiwImportHint" style="font-size:12px;color:var(--sub)">仅支持 AI提分工坊备份结构。</div>
    <div class="btn-row"><button class="admin-btn" onclick="hideModal()">关闭</button></div>
  `);
}
function aiWorkshopHandleImportBackup(event){
  const file = event.target.files && event.target.files[0];
  if(!file) return;
  if(!file.name.toLowerCase().endsWith('.json')){
    showToast('仅支持 .json 文件');
    return;
  }
  const reader = new FileReader();
  reader.onload = e=>{
    try{
      const parsed = JSON.parse(e.target.result);
      const data = parsed && parsed.data ? parsed.data : null;
      if(!data || !Array.isArray(data.students) || !Array.isArray(data.quizzes) || !Array.isArray(data.questions) || !Array.isArray(data.answers)){
        showToast('导入失败：JSON 结构不符合要求');
        return;
      }
      if(!confirm('导入将替换全部 AI提分工坊数据，是否继续？')) return;
      if(!confirm('请再次确认：该操作不可撤销，是否继续导入？')) return;
      const success = safeBatchSetItem([
        {key: AI_WORKSHOP_META_KEY, value: JSON.stringify(data.meta || {version:'v1-p1',updatedAt:aiWorkshopNow()}), description: '工坊元数据'},
        {key: AI_WORKSHOP_STUDENTS_KEY, value: JSON.stringify(data.students), description: '工坊学生'},
        {key: AI_WORKSHOP_QUIZZES_KEY, value: JSON.stringify(data.quizzes), description: '工坊小测'},
        {key: AI_WORKSHOP_QUESTIONS_KEY, value: JSON.stringify(data.questions), description: '工坊题目'},
        {key: AI_WORKSHOP_ANSWERS_KEY, value: JSON.stringify(data.answers), description: '工坊作答记录'},
      ], {description: '导入工坊数据'});
      if(!success) return;
      aiWorkshopLoadData();
      hideModal();
      showToast('工坊数据导入成功');
      showAiWorkshopPage();
    }catch(err){
      showToast('导入失败：JSON 文件无效');
    }
  };
  reader.readAsText(file);
}
function aiWorkshopRunDataCheck(){
  const issues = [];
  if(!Array.isArray(aiWorkshopStudents)) issues.push('students 不是数组');
  if(!Array.isArray(aiWorkshopQuizzes)) issues.push('quizzes 不是数组');
  if(!Array.isArray(aiWorkshopQuestions)) issues.push('questions 不是数组');
  if(!Array.isArray(aiWorkshopAnswers)) issues.push('answers 不是数组');
  const studentIds = new Set(aiWorkshopStudents.map(s=>s.id));
  const quizIds = new Set(aiWorkshopQuizzes.map(q=>q.id));
  const questionIds = new Set(aiWorkshopQuestions.map(q=>q.id));
  const quizById = Object.fromEntries(aiWorkshopQuizzes.map(q=>[q.id,q]));
  aiWorkshopQuizzes.forEach(q=>{ if(!studentIds.has(q.studentId)) issues.push(`小测 ${q.title||q.id} 找不到学生`); });
  aiWorkshopQuestions.forEach(q=>{ if(!quizIds.has(q.quizId)) issues.push(`题目 ${q.id} 找不到小测`); });
  aiWorkshopAnswers.forEach(a=>{
    if(!questionIds.has(a.questionId)) issues.push(`作答 ${a.id} 找不到题目`);
    if(!studentIds.has(a.studentId)) issues.push(`作答 ${a.id} 找不到学生`);
    if(!quizIds.has(a.quizId)) issues.push(`作答 ${a.id} 找不到小测`);
  });
  const countMismatches = [];
  aiWorkshopQuizzes.forEach(q=>{
    const actual = aiWorkshopQuestions.filter(x=>x.quizId===q.id).length;
    if(Number(q.questionCount||0)!==actual) countMismatches.push({quizId:q.id,title:q.title||q.id,stored:q.questionCount||0,actual});
  });
  aiWorkshopLastCheckResult = {issues,countMismatches,checkedAt:aiWorkshopNow()};
  renderAiWorkshopStudents();
}
function aiWorkshopFixQuestionCount(){
  aiWorkshopSyncAllQuizQuestionCounts();
  saveAiWorkshopQuizzes();
  showToast('questionCount 已按题目数修复');
  aiWorkshopRunDataCheck();
}

  document.getElementById('profilePage').style.display='none';

  page.style.display = 'block';

    <div class="aiw-topbar">
      <div>
        <h2>AI提分工坊</h2>
        <div class="sub">高中数学诊断小测闭环原型</div>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="admin-btn" onclick="showProfilePage()">返回学员成长系统</button>
        <button class="admin-btn danger" onclick="doLogout()">退出登录</button>
      </div>
    </div>
    <div class="aiw-wrap">
      <div class="aiw-card">
        <div class="aiw-toolbar">
          <h3 style="margin:0;color:var(--navy)">学生建档与小测草稿</h3>
          <button class="admin-btn primary" data-testid="aiw-btn-add-student" onclick="aiWorkshopShowStudentModal()">+ 新增学生</button>
        </div>
        <div id="aiWorkshopContent"></div>
      </div>
    </div>`;
  renderAiWorkshopStudents();

function renderAiWorkshopStudents(){
  const container = document.getElementById('aiWorkshopContent');
  if(!container) return;
  const cap = aiWorkshopEstimateStorage();
  const dataCheck = aiWorkshopLastCheckResult;
  const students = aiWorkshopStudents.slice().sort((a,b)=>new Date(b.updatedAt)-new Date(a.updatedAt));
  const summaryHtml = `
    <div class="aiw-card" style="background:#F8FAFD">
      <div class="aiw-toolbar">
        <h3 style="margin:0;color:var(--navy)">数据安全与容量提示</h3>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <button class="admin-btn" data-testid="aiw-btn-export" onclick="aiWorkshopExportBackup()">导出工坊数据</button>
          <button class="admin-btn" data-testid="aiw-btn-import" onclick="aiWorkshopShowImportModal()">导入工坊数据</button>
          <button class="admin-btn" data-testid="aiw-btn-check-data" onclick="aiWorkshopRunDataCheck()">检查工坊数据</button>
        </div>
      </div>
      <div style="font-size:12px;line-height:1.8;color:var(--sub)">
        当前估算占用：<strong>${aiWorkshopEscapeHtml(aiWorkshopFormatSizeFromChars(cap.totalChars))}</strong>（图片约 ${aiWorkshopEscapeHtml(aiWorkshopFormatSizeFromChars(cap.imageChars))}）<br>
        学生数：${aiWorkshopStudents.length}，小测数：${aiWorkshopQuizzes.length}，题目数：${aiWorkshopQuestions.length}，作答数：${aiWorkshopAnswers.length}，图片数：${cap.imageCount}<br>
        当前为本地原型存储，图片以 base64 存在浏览器中。数据量较大时可能触发浏览器容量限制。建议每次真实使用后导出备份。
      </div>
      ${dataCheck ? `
        <div style="margin-top:10px;font-size:12px">
          <div><strong>最近检查时间：</strong>${aiWorkshopEscapeHtml((dataCheck.checkedAt||'').slice(0,19).replace('T',' '))}</div>
          <div><strong>异常项：</strong>${dataCheck.issues.length ? dataCheck.issues.map(x=>`<div style='color:var(--red)'>${aiWorkshopEscapeHtml(x)}</div>`).join('') : '无'}</div>
          <div><strong>questionCount 不一致：</strong>${dataCheck.countMismatches.length ? dataCheck.countMismatches.map(x=>`<div style='color:var(--orange)'>${aiWorkshopEscapeHtml(x.title)}：存储 ${x.stored} / 实际 ${x.actual}</div>`).join('') : '无'}</div>
          ${dataCheck.countMismatches.length ? `<div style="margin-top:8px"><button class="admin-btn" onclick="aiWorkshopFixQuestionCount()">修复 questionCount</button></div>` : ''}
        </div>` : ''}
    </div>
  `;
  if(!students.length){
    container.innerHTML = `${summaryHtml}<div class="aiw-empty">暂无学生档案，点击右上角“新增学生”开始建档。</div>`;
    return;
  }
  container.innerHTML = `
    ${summaryHtml}
    <div class="aiw-grid header">
      <div>姓名</div><div>年级</div><div>当前分</div><div>目标分</div><div>训练重点</div><div style="text-align:right">操作</div>
    </div>
    ${students.map(s=>`
      <div class="aiw-grid aiw-row">
        <div><strong>${aiWorkshopEscapeHtml(s.name || '未命名')}</strong><div style="font-size:11px;color:var(--sub)">${aiWorkshopEscapeHtml(s.studentLevel || '')}</div></div>
        <div>${aiWorkshopEscapeHtml(s.grade)}</div>
        <div>${s.currentScore === '' ? '-' : s.currentScore}</div>
        <div>${s.targetScore === '' ? '-' : s.targetScore}</div>
        <div>${aiWorkshopEscapeHtml(s.currentFocus || '-')}</div>

function aiWorkshopRenderStatsHtml(stats){
  const pct = stats.fullScore ? ((stats.totalScore / stats.fullScore) * 100).toFixed(1) : '0.0';
  const renderBucket = (bucket)=>{
    const entries = Object.entries(bucket);
    if(!entries.length) return '暂无';
    return entries.map(([k,v])=>`${aiWorkshopEscapeHtml(k)}：${v.correct}/${v.total}`).join('<br>');
  };
  const tagFreq = Object.entries(stats.tagFreq).sort((a,b)=>b[1]-a[1]);
  return `
    <div class="aiw-stats-box" id="aiwStatsReport">
      <div><strong>总题数：</strong>${stats.total}　<strong>已批改题数：</strong>${stats.graded}</div>
      <div><strong>正确：</strong>${stats.correct}　<strong>错误：</strong>${stats.wrong}　<strong>半对：</strong>${stats.half}　<strong>未作答：</strong>${stats.empty}　<strong>待确认：</strong>${stats.pending}</div>
      <div><strong>总得分：</strong>${stats.totalScore} / ${stats.fullScore}　<strong>得分率：</strong>${pct}%</div>
      <div><strong>按题型统计：</strong><br>${renderBucket(stats.byType)}</div>
      <div><strong>按难度统计：</strong><br>${renderBucket(stats.byDifficulty)}</div>
      <div><strong>按知识模块统计：</strong><br>${renderBucket(stats.byModule)}</div>
      <div><strong>按知识点统计：</strong><br>${renderBucket(stats.byPoint)}</div>
      <div><strong>错因标签频次：</strong><br>${tagFreq.length ? tagFreq.map(([k,v])=>`${aiWorkshopEscapeHtml(k)}：${v}`).join('<br>') : '暂无'}</div>
      <div><strong>当前最突出3个问题：</strong><br>${stats.topIssues.length ? stats.topIssues.map(x=>aiWorkshopEscapeHtml(x)).join('<br>') : '暂无'}</div>
    </div>
  `;
}

function aiWorkshopApplyDefaultScore(questionId, fullScore){
  const resultEl = document.getElementById(`aiw_ans_result_${questionId}`);
  const scoreEl = document.getElementById(`aiw_ans_score_${questionId}`);
  if(!resultEl || !scoreEl) return;
  const score = aiWorkshopDefaultScoreByResult(resultEl.value, fullScore);
  if(score !== '') scoreEl.value = score;
}
function aiWorkshopHandleAnswerImageChange(questionId, event){
  const file = event.target.files && event.target.files[0];
  if(!file) return;
  const hint = document.getElementById(`aiw_ans_img_hint_${questionId}`);
  const allowed = ['image/jpeg','image/png','image/webp'];
  if(!allowed.includes(file.type)){
    showToast('仅支持 jpg/jpeg/png/webp 图片');
    event.target.value = '';
    if(hint) hint.textContent = '未上传图片';
    return;
  }
  const maxSize = 1024 * 1024;
  if(file.size > maxSize){
    showToast('图片超过1MB，请压缩后再上传');
    event.target.value = '';
    if(hint) hint.textContent = '未上传图片';
    return;
  }
  const reader = new FileReader();
  reader.onload = () => {
    let ans = aiWorkshopAnswers.find(a=>a.quizId===aiWorkshopCurrentQuizId && a.questionId===questionId);
    if(!ans){
      const quiz = aiWorkshopQuizzes.find(q=>q.id===aiWorkshopCurrentQuizId);
      ans = aiWorkshopNormalizeAnswer({studentId: quiz?.studentId || '', quizId: aiWorkshopCurrentQuizId, questionId});
      aiWorkshopAnswers.push(ans);
    }
    ans.studentAnswerImageData = String(reader.result || '');
    ans.studentAnswerImageName = file.name;
    ans.updatedAt = aiWorkshopNow();
    saveAiWorkshopAnswers();
    showToast('图片已保存（本地原型存储）');
    renderAiWorkshopQuizGradingPage(aiWorkshopCurrentQuizId);
  };
  reader.readAsDataURL(file);
}
function aiWorkshopSaveAnswer(questionId, fullScore){
  const quiz = aiWorkshopQuizzes.find(q=>q.id===aiWorkshopCurrentQuizId);
  if(!quiz) return;
  const result = document.getElementById(`aiw_ans_result_${questionId}`).value;
  const scoreRaw = document.getElementById(`aiw_ans_score_${questionId}`).value;
  const score = scoreRaw === '' ? aiWorkshopDefaultScoreByResult(result, fullScore) : Number(scoreRaw) || 0;
  const tags = Array.from(document.querySelectorAll(`.aiw_ans_tag_${questionId}:checked`)).map(el=>el.value);
  const now = aiWorkshopNow();
  const old = aiWorkshopGetAnswer(quiz.studentId, quiz.id, questionId);
  const next = aiWorkshopNormalizeAnswer({
    id: old ? old.id : aiWorkshopGenId('ans'),
    studentId: quiz.studentId,
    quizId: quiz.id,
    questionId,
    studentAnswerText: document.getElementById(`aiw_ans_text_${questionId}`).value.trim(),
    studentAnswerImageData: old ? old.studentAnswerImageData : '',
    studentAnswerImageName: old ? old.studentAnswerImageName : '',
    result,
    score,
    teacherComment: document.getElementById(`aiw_ans_comment_${questionId}`).value.trim(),
    mistakeTags: tags,
    aiRecognizedAnswer: old ? old.aiRecognizedAnswer : '',
    aiJudgment: old ? old.aiJudgment : '',
    aiErrorStep: old ? old.aiErrorStep : '',
    aiMistakeTags: old ? old.aiMistakeTags : [],
    aiDiagnosis: old ? old.aiDiagnosis : '',
    aiStatus: old ? old.aiStatus : '未识别',
    createdAt: old ? old.createdAt : now,
    updatedAt: now
  });
  const idx = aiWorkshopAnswers.findIndex(a=>a.id===next.id);
  if(idx>=0) aiWorkshopAnswers[idx] = next; else aiWorkshopAnswers.push(next);
  if(quiz.status === '草稿') quiz.status = '待批改';
  quiz.updatedAt = now;
  saveAiWorkshopAnswers();
  saveAiWorkshopQuizzes();
  showToast('本题批改已保存');
  renderAiWorkshopQuizGradingPage(quiz.id);
}

function aiWorkshopCopyQuizToStudent(quizId){

  if(!targetStudent){ showToast('未找到目标学生'); return; }
  const now = aiWorkshopNow();
  const newQuizId = aiWorkshopGenId('quiz');
  const newQuiz = aiWorkshopNormalizeQuiz({
    ...quiz,
    id: newQuizId,
    studentId: targetStudentId,
    title: `${quiz.title || '未命名小测'}（复制）`,
    grade: targetStudent.grade,
    questionCount: 0,
    createdAt: now,
    updatedAt: now
  });
  const sourceQuestions = aiWorkshopGetQuestionsByQuizId(quizId);
  const clonedQuestions = sourceQuestions.map((item,idx)=>aiWorkshopNormalizeQuestion({
    ...item,
    id: aiWorkshopGenId('q'),
    quizId: newQuizId,
    questionNumber: idx + 1,
    order: idx + 1,
    createdAt: now,
    updatedAt: now
  }));
  newQuiz.questionCount = clonedQuestions.length;
  aiWorkshopQuizzes.push(newQuiz);
  aiWorkshopQuestions.push(...clonedQuestions);
  saveAiWorkshopQuizzes();
  saveAiWorkshopQuestions();
  hideModal();
  aiWorkshopCurrentStudentId = targetStudentId;
  showToast(`已复制到 ${targetStudent.name}，共 ${clonedQuestions.length} 题`);
  renderAiWorkshopStudentDetail(targetStudentId);

function createAiWorkshopQuestion(quizId, questionId=''){
  const questionType = document.getElementById('aiw_q_type').value;
  const order = Math.max(1, Number(document.getElementById('aiw_q_order').value) || 1);
  const selectedTags = Array.from(document.querySelectorAll('.aiw_q_mistake_tags:checked')).map(el=>el.value);
  const extraTags = aiWorkshopParseMistakeTags(document.getElementById('aiw_q_extra_tags').value);
  const mergedTags = Array.from(new Set([...selectedTags, ...extraTags]));
  const now = aiWorkshopNow();
  const old = questionId ? aiWorkshopQuestions.find(q=>q.id===questionId) : null;
  const next = aiWorkshopNormalizeQuestion({
    id: questionId || aiWorkshopGenId('q'),
    quizId,
    questionType,
    questionText: document.getElementById('aiw_q_text').value.trim(),
    latexContent: document.getElementById('aiw_q_latex').value.trim(),
    standardAnswer: document.getElementById('aiw_q_answer').value.trim(),
    explanation: document.getElementById('aiw_q_explanation').value.trim(),
    knowledgeModule: document.getElementById('aiw_q_module').value.trim(),
    knowledgePoint: document.getElementById('aiw_q_point').value.trim(),
    difficulty: document.getElementById('aiw_q_difficulty').value,
    diagnosticPurpose: document.getElementById('aiw_q_diagnostic').value.trim(),
    testedAbility: document.getElementById('aiw_q_ability').value.trim(),
    commonMistakeTags: mergedTags,
    score: Number(document.getElementById('aiw_q_score').value) || 0,
    order,
    questionImageData: old ? old.questionImageData : '',
    questionImageUrl: old ? old.questionImageUrl : '',
    aiRecognizedQuestion: old ? old.aiRecognizedQuestion : '',
    aiRecognitionStatus: old ? old.aiRecognitionStatus : '未识别',
    aiConfidence: old ? old.aiConfidence : '',
    teacherConfirmedQuestion: old ? old.teacherConfirmedQuestion : '',
    createdAt: old ? old.createdAt : now,
    updatedAt: now
  });
  const idx = aiWorkshopQuestions.findIndex(q=>q.id===next.id);
  if(idx>=0) aiWorkshopQuestions[idx] = next;
  else aiWorkshopQuestions.push(next);
  aiWorkshopReindexQuestions(quizId);
  aiWorkshopUpdateQuizQuestionCount(quizId);
  saveAiWorkshopQuestions();
  saveAiWorkshopQuizzes();
  hideModal();
  showToast(questionId ? '题目已更新' : '题目已创建');
  renderAiWorkshopQuizQuestions(quizId);
}
function aiWorkshopDeleteQuestion(questionId){
  const q = aiWorkshopQuestions.find(x=>x.id===questionId);
  if(!q) return;
  if(!confirm(`确定删除第${q.questionNumber}题？`)) return;
  if(!confirm('请再次确认删除，删除后不可恢复。')) return;
  const quizId = q.quizId;
  aiWorkshopQuestions = aiWorkshopQuestions.filter(x=>x.id!==questionId);
  aiWorkshopReindexQuestions(quizId);
  aiWorkshopUpdateQuizQuestionCount(quizId);
  saveAiWorkshopQuestions();
  saveAiWorkshopQuizzes();
  showToast('题目已删除');
  renderAiWorkshopQuizQuestions(quizId);
}
function aiWorkshopDeleteQuiz(quizId){
  const q = aiWorkshopQuizzes.find(x=>x.id===quizId);

  if(!confirm('请再次确认删除，删除后不可恢复。')) return;
  aiWorkshopQuizzes = aiWorkshopQuizzes.filter(x=>x.id!==quizId);

  aiWorkshopCurrentQuizId = '';

/* ===== localStorage 安全写入封装 ===== */
// Layer 1: 单次写入保护
function safeSetItem(key, value, options = {}) {
  const { silent = false, warnAt = 4 * 1024 * 1024, description = '' } = options;
  try {
    localStorage.setItem(key, value);
    // 写入成功后异步检查总占用
    const _throttleCheck = (function() {
      let lastWarnTime = 0;
      return function() {
        const now = Date.now();
        if (now - lastWarnTime < 30 * 60 * 1000) return; // 30分钟内不重复弹
        lastWarnTime = now;
        let total = 0;
        try {
          for (let i = 0; i < localStorage.length; i++) {
            const k = localStorage.key(i);
            const v = localStorage.getItem(k);
            total += (k ? k.length : 0) + (v ? v.length : 0);
          }
        } catch (_) { /* 估算失败则跳过 */ }
        if (total >= warnAt) {
          const usedMB = (total / 1024 / 1024).toFixed(1);
          setTimeout(() => {
            showToast(`⚠️ 存储空间使用已达 ${usedMB}MB，接近浏览器上限(5MB)。建议立即导出备份。`);
          }, 0);
        }
      };
    })();
    if (!silent) _throttleCheck();
    return true;
  } catch (err) {
    if (err.name === 'QuotaExceededError' || err.code === 22 || err.code === 1014) {
      if (!silent) {
        const name = description || key;
        showModal(`
          <h3 style="color:var(--red)">💾 存储空间已满</h3>
          <p>存储「${name}」失败，localStorage 已达浏览器上限（通常 5MB）。</p>
          <p>请立即操作：</p>
          <p>1. 点击"立即导出"备份当前数据</p>
          <p>2. 联系管理员减少历史数据</p>
          <p style="margin-top:12px;padding:8px;background:#fff3cd;border-radius:4px">本次操作未保存，请重试。</p>
          <div class="btn-row">
            <button class="admin-btn primary" onclick="exportData();hideModal()">立即导出</button>
            <button class="admin-btn" onclick="hideModal()">我知道了</button>
          </div>
        `);
      }
      return false;
    }
    // 非配额异常：重新抛出
    throw err;
  }
}
// Layer 2: 批量写入保护（原子语义）
function safeBatchSetItem(entries, options = {}) {
  const { atomic = true, description = '批量写入' } = options;
  // 先记录旧值
  const rollbackMap = {};
  for (const entry of entries) {
    const oldVal = (function() {
      try { return localStorage.getItem(entry.key); } catch(_) { return null; }
    })();
    rollbackMap[entry.key] = oldVal; // null 表示 key 原本不存在
  }
  // 逐个写入
  const writtenKeys = [];
  for (const entry of entries) {
    try {
      localStorage.setItem(entry.key, entry.value);
      writtenKeys.push(entry.key);
    } catch (err) {
      if (err.name === 'QuotaExceededError' || err.code === 22 || err.code === 1014) {
        // 回滚已写入的
        if (atomic) {
          for (const k of writtenKeys) {
            try {
              if (rollbackMap[k] === null) {
                localStorage.removeItem(k);
              } else {
                localStorage.setItem(k, rollbackMap[k]);
              }
            } catch(_) { /* 回滚失败也不影响主流程 */ }
          }
        }
        showModal(`
          <h3 style="color:var(--red)">💾 存储空间不足</h3>
          <p>${description}失败：存储空间不足。</p>
          <p style="margin-top:8px;padding:8px;background:#e8f4e8;border-radius:4px">已恢复到操作前状态，数据未受影响。</p>
          <p>请先导出备份后重试。</p>

            <button class="admin-btn primary" onclick="exportData();hideModal()">立即导出</button>
            <button class="admin-btn" onclick="hideModal()">我知道了</button>
          </div>
        `);
        return false;
      }
      throw err;
    }
  }
  // 全部成功后容量预警检查
  (function() {
    try {
      let total = 0;
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        const v = localStorage.getItem(k);
        total += (k ? k.length : 0) + (v ? v.length : 0);
      }

        const usedMB = (total / 1024 / 1024).toFixed(1);
        setTimeout(() => {
          showToast(`⚠️ 存储空间使用已达 ${usedMB}MB，接近浏览器上限(5MB)。建议立即导出备份。`);
        }, 0);
      }
    } catch(_) {}
  })();
  return true;
}

function val(v){ return (v===undefined || v===null || String(v).trim()==='') ? EMPTY_TEXT : String(v); }
function maskPhone(phone){
  const raw = String(phone || '');
  if(!raw || raw==='未填写') return EMPTY_TEXT;
  if(raw.includes('****')) return raw;
  const digits = raw.replace(/\D/g,'');
  if(digits.length === 11) return digits.replace(/(\d{3})\d{4}(\d{4})/,'$1****$2');
  return raw.length > 5 ? raw.slice(0,3) + '****' + raw.slice(-2) : raw;
}

function monthFromDate(dateStr){
  if(!dateStr) return '';
  const d = new Date(dateStr);
  if(Number.isNaN(d.getTime())) return String(dateStr).slice(0,7);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
}
function parseExcelDate(v){
  if(v===undefined || v===null || v==='') return '';
  if(typeof v === 'number'){
    const date = XLSX.SSF.parse_date_code(v);
    if(date) return `${date.y}-${String(date.m).padStart(2,'0')}-${String(date.d).padStart(2,'0')}`;
  }
  const d = new Date(v);
  if(Number.isNaN(d.getTime())) return String(v).trim();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function genId(){ return 'stu_' + Date.now() + '_' + Math.random().toString(36).slice(2,6); }
function genCode() {
  const ALPHABET = 'ABCDEFGHJKMNPQRSTUVWXYZ23456789'; // 31 字符,无 0/O/1/I/l
  const LENGTH = 10;
  const arr = new Uint8Array(LENGTH);
  for (let attempt = 0; attempt < 10; attempt++) {
    crypto.getRandomValues(arr);
    let code = '';
    for (let i = 0; i < LENGTH; i++) {
      code += ALPHABET[arr[i] % ALPHABET.length];
    }
    if (!allStudents.some(s => s.archiveCode === code)) {
      return code;
    }
  }
  throw new Error('genCode: 连续 10 次生成均碰撞,localStorage 异常');
}

// ===== 阶段 8:云端加密同步 =====
const CLOUD_SYNC_SALT = new TextEncoder().encode('weiduo-edu-2026-static-salt');
const CLOUD_SYNC_ITERATIONS = 100000;

async function encryptStudent(student, archiveCode) {
  const keyMaterial = await crypto.subtle.importKey('raw', new TextEncoder().encode(archiveCode), 'PBKDF2', false, ['deriveKey']);
  const key = await crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt: CLOUD_SYNC_SALT, iterations: CLOUD_SYNC_ITERATIONS, hash: 'SHA-256' },
    keyMaterial, { name: 'AES-GCM', length: 256 }, false, ['encrypt']
  );
  const plaintext = new TextEncoder().encode(JSON.stringify(student));
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const ciphertext = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, plaintext);
  return {
    iv: btoa(String.fromCharCode(...iv)),
    ciphertext: btoa(String.fromCharCode(...new Uint8Array(ciphertext)))
  };
}

async function decryptStudent(encryptedBlob, archiveCode) {
  const keyMaterial = await crypto.subtle.importKey('raw', new TextEncoder().encode(archiveCode), 'PBKDF2', false, ['deriveKey']);
  const key = await crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt: CLOUD_SYNC_SALT, iterations: CLOUD_SYNC_ITERATIONS, hash: 'SHA-256' },
    keyMaterial, { name: 'AES-GCM', length: 256 }, false, ['decrypt']
  );
  const iv = Uint8Array.from(atob(encryptedBlob.iv), function(c){ return c.charCodeAt(0); });
  const ciphertext = Uint8Array.from(atob(encryptedBlob.ciphertext), function(c){ return c.charCodeAt(0); });
  const plaintext = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, ciphertext);
  return JSON.parse(new TextDecoder().decode(plaintext));
}

async function exportEncryptedData() {
  const result = { version: '1.0', updatedAt: new Date().toISOString(), students: {} };
  for (const student of allStudents) {
    if (!student.archiveCode) continue;
    result.students[student.archiveCode] = await encryptStudent(student, student.archiveCode);
  }
  return result;
}

async function loadAndDecryptStudent(archiveCode) {
  // data/ 在 repo 根目录,相对于 deploy/index.html 是 ../data/
  const base = window.location.href.substring(0, window.location.href.lastIndexOf('/'));
  const dataUrl = base + '/../data/students-encrypted.json?t=' + Date.now();
  const response = await fetch(dataUrl);
  if (!response.ok) throw new Error('无法加载档案数据,请检查网络连接');
  const data = await response.json();
  const encryptedBlob = data.students[archiveCode];
  if (!encryptedBlob) throw new Error('档案编号不存在');
  try {
    const student = await decryptStudent(encryptedBlob, archiveCode);
    return { student: student, updatedAt: data.updatedAt };
  } catch (e) {
    throw new Error('档案码无效');
  }
}

async function handleCloudSync() {
  try {
    const data = await exportEncryptedData();
    const json = JSON.stringify(data, null, 2);
    const blob = new Blob([json], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'students-encrypted.json';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showModal(
      '<h3>☁️ 同步到云端</h3>' +
      '<p>已生成加密数据文件 <code>students-encrypted.json</code>。</p>' +
      '<p>请执行以下步骤发布给家长：</p>' +
      '<ol style="text-align:left;line-height:2">' +
      '<li>将下载的文件放入 repo 的 <code>data/</code> 目录</li>' +
      '<li>执行 <code>git add data/students-encrypted.json && git commit -m "update: cloud sync data" && git push</code></li>' +
      '<li>等待 GitHub Pages 自动部署（约 1-2 分钟）</li>' +
      '</ol>',
      '<button class="admin-btn primary" onclick="hideModal()">我知道了</button>'
    );
  } catch (e) {

  }
}

function migrateLegacyArchiveCodes() {
  const LEGACY_PATTERN = /^WD\d{8}$/; // 旧格式:WD + 8 位数字
  let migrated = 0;
  for (const s of allStudents) {
    if (LEGACY_PATTERN.test(s.archiveCode)) {
      s.archiveCode = genCode();
      migrated++;
    }
  }
  if (migrated > 0) {
    saveData();
    console.log('[migration] ' + migrated + ' legacy archive codes regenerated');
  }
}

function checkBackupReminder(){
  // 稍后提醒检查
  const snoozed = localStorage.getItem('weiduo_export_reminder_snoozed_at');
  if(snoozed && Date.now() - Number(snoozed) < 24 * 3600 * 1000) return;
  
  const lastExport = localStorage.getItem('weiduo_last_export_at');
  let message = '';
  if(!lastExport){
    message = '您还没有备份过数据。建议立即导出备份，以防意外丢失。\n\n点确定立即导出，点取消稍后提醒。';
  } else {
    const days = Math.floor((Date.now() - Number(lastExport)) / (24 * 3600 * 1000));
    if(days <= 7) return;
    message = '距您上次备份已超过 ' + days + ' 天。建议立即导出备份，以防意外丢失。\n\n点确定立即导出，点取消稍后提醒。';
  }
  
  // 放弃 default confirm,用 showModal 自定义弹窗
  showModal(`
    <h3 style="color:var(--navy)">💾 建议立即备份</h3>
    <p>${message.replace(/\n/g, '<br>')}</p>
    <div class="btn-row">
      <button class="admin-btn primary" onclick="doExportAndRecord();hideModal()">立即导出</button>
      <button class="admin-btn" onclick="snoozeReminder();hideModal()">稍后提醒</button>
    </div>
  `);
}

function getLastCommunication(student){
  const list = safeArray(student.communications).filter(c=>c.date);
  list.sort((a,b)=>new Date(b.date)-new Date(a.date));
  return list[0] || null;
}
function getCommDays(student){
  const last = getLastCommunication(student);
  if(!last) return 999;
  return Math.floor((new Date() - new Date(last.date)) / 86400000);
}
function isProfileIncomplete(student){
  return [student.status,student.studentType,student.strengths,student.improvements,student.nextPlan,student.teacherAdvice,student.familyAdvice].some(v=>!String(v||'').trim());
}
function hasScoreDecline(student){
  if(safeArray(student.growth).length < 2) return false;
  const growth = safeArray(student.growth).slice().sort((a,b)=>new Date(a.date)-new Date(b.date));
  const first = growth[0], last = growth[growth.length-1];
  const subjects = new Set([...Object.keys(first.scores||{}), ...Object.keys(last.scores||{})]);
  for(const sub of subjects){
    if(first.scores[sub]!==undefined && last.scores[sub]!==undefined && (last.scores[sub] + 5) < first.scores[sub]) return true;
  }
  return false;
}
function getFocusReasons(student){
  const reasons = [];
  if(getCommDays(student) > COMM_WARN_DAYS) reasons.push('超过14天未沟通');
  if(safeArray(student.diagnosis && student.diagnosis.weakSubjects).length) reasons.push('存在薄弱科目');
  if(hasScoreDecline(student)) reasons.push('成绩明显下降');
  if(isProfileIncomplete(student)) reasons.push('档案资料不完整');
  if(getCourseRiskList(summarizeLatestSnapshot(student.courseAccount||{snapshots:[]})).length) reasons.push('课程账户余额不足');
  return reasons;
}

function scoreClass(s){ if(s>=80) return 'high'; if(s>=50) return 'mid'; return 'low'; }
function moodTag(mood){ const map={'非常满意':'green','满意':'blue','一般':'orange','有疑虑':'purple','不满意':'red'}; return `<span class="tag ${map[mood]||'blue'}">${mood}</span>`; }
function computeScoreSummary(g){
  if(!g || !g.scores || Object.keys(g.scores).length===0) return EMPTY_TEXT;
  return Object.entries(g.scores).map(([k,v])=>`${k}${v}`).join(' / ');
}

function renderTrendChart(s){
  const container = document.getElementById('trendChart');
  if(!container) return;
  const growthList = safeArray(s.growth).filter(g=>g.date).slice().sort((a,b)=>new Date(a.date)-new Date(b.date));
  if(growthList.length < 2){
    container.innerHTML = '<div style="text-align:center;color:#999;padding:20px;font-size:13px">需要至少 2 次成绩记录才能生成趋势图</div>';
    return;
  }
  const activeSubjects = SUBJECT_OPTIONS.filter(sub=>growthList.some(g=>g.scores && g.scores[sub]!==undefined && g.scores[sub]!==null && !Number.isNaN(Number(g.scores[sub]))));
  if(!activeSubjects.length){
    container.innerHTML = '<div style="text-align:center;color:#999;padding:20px;font-size:13px">暂无可展示的成绩趋势</div>';
    return;
  }

  const chartWidth = 700, chartHeight = 260;
  const pad = {l:38,r:18,t:18,b:40};
  const innerW = chartWidth - pad.l - pad.r;
  const innerH = chartHeight - pad.t - pad.b;
  const yTicks = [0,20,40,60,80,100];
  const colors = ['#1A2B4E','#C8A951','#1565C0','#2E7D32','#E65100','#6A1B9A','#00838F'];
  const xPos = i => pad.l + (growthList.length===1 ? innerW/2 : (innerW * i / (growthList.length-1)));
  const yPos = v => pad.t + innerH - Math.max(0, Math.min(100, v)) / 100 * innerH;

  const grid = yTicks.map(t=>`<line x1="${pad.l}" y1="${yPos(t)}" x2="${pad.l+innerW}" y2="${yPos(t)}" stroke="#E8ECF3" stroke-width="1"/><text x="${pad.l-6}" y="${yPos(t)+4}" font-size="10" text-anchor="end" fill="#888">${t}</text>`).join('');
  const xLabels = growthList.map((g,i)=>`<text x="${xPos(i)}" y="${chartHeight-12}" font-size="10" text-anchor="middle" fill="#777">${g.date.slice(5)}</text>`).join('');
  const axes = `<line x1="${pad.l}" y1="${pad.t}" x2="${pad.l}" y2="${pad.t+innerH}" stroke="#9AA4B2"/><line x1="${pad.l}" y1="${pad.t+innerH}" x2="${pad.l+innerW}" y2="${pad.t+innerH}" stroke="#9AA4B2"/>`;

  const lines = activeSubjects.map((sub,idx)=>{
    const pts = growthList.map((g,i)=> g.scores && g.scores[sub]!==undefined && !Number.isNaN(Number(g.scores[sub])) ? `${xPos(i)},${yPos(Number(g.scores[sub]))}` : null);
    const segments = [];
    let current = [];
    pts.forEach(p=>{ if(p){ current.push(p);} else if(current.length){ segments.push(current); current=[]; }});
    if(current.length) segments.push(current);
    const circles = growthList.map((g,i)=>{
      const v = g.scores && g.scores[sub];
      if(v===undefined || Number.isNaN(Number(v))) return '';
      return `<circle cx="${xPos(i)}" cy="${yPos(Number(v))}" r="2.5" fill="${colors[idx % colors.length]}"/>`;
    }).join('');
    return segments.map(seg=>`<polyline points="${seg.join(' ')}" fill="none" stroke="${colors[idx % colors.length]}" stroke-width="2"/>`).join('') + circles;
  }).join('');
  const legends = activeSubjects.map((sub,idx)=>`<span style="display:inline-flex;align-items:center;gap:4px;margin-right:10px;font-size:12px;color:#555"><i style="display:inline-block;width:10px;height:10px;background:${colors[idx % colors.length]};border-radius:2px"></i>${sub}</span>`).join('');

  let table = '<div style="overflow-x:auto;margin-top:14px"><table style="width:100%;border-collapse:collapse;font-size:12px">';
  table += '<tr style="background:var(--navy);color:#fff"><th style="padding:8px 12px">日期</th><th style="padding:8px 8px">类型</th>';
  activeSubjects.forEach(sub=> table += `<th style="padding:8px 8px">${sub}</th>`);
  table += '</tr>';
  growthList.forEach((g,i)=>{
    const bg = i%2===0?'#fff':'var(--light)';
    table += `<tr style="background:${bg}"><td style="padding:8px 12px;text-align:center">${g.date}</td><td style="padding:8px 8px;text-align:center">${g.type||''}</td>`;
    activeSubjects.forEach(sub=>{
      const v = g.scores && g.scores[sub];
      table += `<td style="padding:8px 8px;text-align:center">${(v===undefined || Number.isNaN(Number(v)))?'-':v}</td>`;
    });
    table += '</tr>';
  });
  table += '</table></div>';

  container.innerHTML = `<div style="overflow-x:auto"><svg viewBox="0 0 ${chartWidth} ${chartHeight}" style="width:100%;min-width:620px;height:auto;background:#fff;border:1px solid var(--border);border-radius:8px;padding:8px">${grid}${axes}${lines}${xLabels}</svg></div><div style="margin-top:10px">${legends}</div>${table}`;
}

function summarizeLatestSnapshot(courseAccount){
  const snapshots = safeArray(courseAccount.snapshots);
  if(!snapshots.length) return null;
  const latestDate = snapshots.map(s=>s.cutoffDate).sort().slice(-1)[0];
  const current = snapshots.filter(s=>s.cutoffDate===latestDate);
  const sum = (arr, field, filterFn)=>arr.filter(filterFn||(()=>true)).reduce((n,it)=>n+(parseFloat(it[field])||0),0);
  const byType = key=>sum(current,'endRegularHours',it=>it.accountType===key);
  const byBonus = key=>sum(current,'endBonusHours',it=>it.accountType===key);
  return {
    cutoffDate: latestDate,
    oneOnOneRegular: byType('oneOnOneRegular'),
    oneOnTwoRegular: byType('oneOnTwoRegular'),
    classRegular: byType('classRegular'),
    oneOnOneBonus: byBonus('oneOnOneBonus'),
    classBonus: byBonus('classBonus'),
    eveningCare: byType('eveningCare'),
    lunchCare: byType('lunchCare'),
    fullCare: byType('fullCare'),
    fullTime: byType('fullTime'),
    other: byType('other'),
    endTotalValue: sum(current,'endTotalValue'),
    monthlyPaidAmount: sum(current,'monthlyPaidAmount'),
    totalPaidAmount: Math.max(...current.map(it=>parseFloat(it.totalPaidAmount)||0),0)
  };
}

function getCourseRiskList(summary){
  if(!summary) return [];
  const rules = [
    ['oneOnOneRegular',2,'节'],['oneOnTwoRegular',2,'节'],['classRegular',2,'节'],
    ['oneOnOneBonus',1,'节'],['classBonus',1,'节'],['eveningCare',1,''],['lunchCare',1,''],['fullCare',1,''],['fullTime',1,'']
  ];
  return rules.map(([k,limit,unit])=>{
    const val = summary[k] || 0;
    if(val < 0) return `需核对：${accountTypeLabel(k)}余额为 ${val}`;
    if(val <= limit) return `${accountTypeLabel(k)}余额不足：仅剩 ${val}${unit}`;
    return null;
  }).filter(Boolean);
}

  const headers = ["学生档案编号","学生姓名","年级","账户月份","截止日期","课程类型","科目/项目","月初正价课时","月初赠送课时","课时单价","月初课时总价","本月续报正课","本月新增赠课","本月消课课时","月底正价课时","月底赠送课时","月底课时总价","本月缴费金额","累计缴费金额","备注"];

function importSnapshotExcel(studentIdx, event){
  const file = event.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = e=>{
    const wb = XLSX.read(e.target.result, {type:'array'});
    const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {defval:''});
    const failures = []; let success=0, covered=0;
    rows.forEach((r,ri)=>{
      const code = String(r["学生档案编号"]||'').trim();
      if(!code){ failures.push(`第${ri+2}行：缺少学生档案编号`); return; }
      const stu = allStudents.find(x=>x.archiveCode===code);
      if(!stu){ failures.push(`第${ri+2}行：未找到档案编号 ${code}`); return; }
      const courseTypeRaw = String(r["课程类型"]||'').trim();
      const accountType = mapCourseTypeToAccountType(courseTypeRaw);
      const item = normalizeStudent({courseAccount:{snapshots:[{
        id: genId(),
        accountMonth: String(r["账户月份"]||'').trim(),
        cutoffDate: parseExcelDate(r["截止日期"]),
        courseType: accountTypeLabel(accountType),
        accountType,
        subjectOrProject: String(r["科目/项目"]||'').trim() || '其它',
        startRegularHours: parseFloat(r["月初正价课时"])||0,
        startBonusHours: parseFloat(r["月初赠送课时"])||0,
        hourUnitPrice: parseFloat(r["课时单价"])||0,
        startTotalValue: parseFloat(r["月初课时总价"])||0,
        renewedRegularHours: parseFloat(r["本月续报正课"])||0,
        renewedBonusHours: parseFloat(r["本月新增赠课"])||0,
        consumedHours: parseFloat(r["本月消课课时"])||0,
        endRegularHours: parseFloat(r["月底正价课时"])||0,
        endBonusHours: parseFloat(r["月底赠送课时"])||0,
        endTotalValue: parseFloat(r["月底课时总价"])||0,
        monthlyPaidAmount: parseFloat(r["本月缴费金额"])||0,
        totalPaidAmount: parseFloat(r["累计缴费金额"])||0,
        note: String(r["备注"]||'').trim()
      }]}}).courseAccount.snapshots[0];
      const list = stu.courseAccount.snapshots;
      const ex = list.findIndex(x=>x.accountMonth===item.accountMonth && x.accountType===item.accountType && x.subjectOrProject===item.subjectOrProject);
      if(ex>=0){ list[ex]=item; covered++; } else { list.push(item); success++; }
    });
    saveData(); renderCourseAccountTab(studentIdx);
    document.getElementById('snapshotImportResult').innerHTML = `成功导入 ${success} 条，覆盖 ${covered} 条，失败 ${failures.length} 条<br>${failures.map(x=>`<div style='color:var(--red)'>${x}</div>`).join('')}`;
  };
  reader.readAsArrayBuffer(file);
}

function importConsumptionExcel(studentIdx, event){
  const file = event.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = e=>{
    const wb = XLSX.read(e.target.result, {type:'array'});
    const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {defval:''});
    const failures=[]; let success=0, skipped=0;
    const prepared = [];
    rows.forEach((r,ri)=>{
      const code = String(r["学生档案编号"]||'').trim();
      if(!code){ failures.push(`第${ri+2}行：缺少学生档案编号`); return; }
      const stu = allStudents.find(x=>x.archiveCode===code);
      if(!stu){ failures.push(`第${ri+2}行：未找到档案编号 ${code}`); return; }
      const date = parseExcelDate(r["日期"]);
      if(!date){ failures.push(`第${ri+2}行：日期为空`); return; }
      const courseTypeRaw = String(r["课程类型"]||'').trim();
      const accountType = mapCourseTypeToAccountType(courseTypeRaw);
      prepared.push({stu,date,month:String(r["月份"]||'').trim()||monthFromDate(date),subject:String(r["科目"]||'').trim()||'其它',courseType:accountTypeLabel(accountType),accountType,usedHours:parseFloat(r["消耗课时"])||0,note:String(r["备注"]||'').trim()});
    });
    let duplicates = 0;
    prepared.forEach(it=>{
      const same = it.stu.courseAccount.consumptions.some(c=>c.date===it.date && (c.subject||'')===it.subject && (c.courseType||'')===it.courseType && Number(c.usedHours||0)===Number(it.usedHours||0) && (c.note||'')===it.note);
      if(same) duplicates++;
    });
    let importDup = true;
    if(duplicates>0) importDup = confirm(`检测到 ${duplicates} 条疑似重复消课记录。确定“仍然导入”吗？\n取消将跳过重复。`);
    prepared.forEach(it=>{
      const same = it.stu.courseAccount.consumptions.some(c=>c.date===it.date && (c.subject||'')===it.subject && (c.courseType||'')===it.courseType && Number(c.usedHours||0)===Number(it.usedHours||0) && (c.note||'')===it.note);
      if(same && !importDup){ skipped++; return; }
      it.stu.courseAccount.consumptions.push({id:genId(),date:it.date,month:it.month,subject:it.subject,courseType:it.courseType,accountType:it.accountType,usedHours:it.usedHours,note:it.note});
      success++;
    });
    saveData(); renderCourseAccountTab(studentIdx);
    document.getElementById('consImportResult').innerHTML = `成功导入 ${success} 条，跳过重复 ${skipped} 条，失败 ${failures.length} 条<br>${failures.map(x=>`<div style='color:var(--red)'>${x}</div>`).join('')}`;
  };
  reader.readAsArrayBuffer(file);
}

      <div class="form-group"><label>日期</label><input id="c_date" type="date" value="${new Date().toISOString().split('T')[0]}"></div>
      <div class="form-group"><label>沟通方式</label><select id="c_method"><option>微信沟通</option><option>面谈</option><option>电话沟通</option><option>家长到校</option></select></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>家长满意度</label><select id="c_mood"><option>满意</option><option>一般</option><option>非常满意</option><option>有疑虑</option><option>不满意</option></select></div>

    <div class="form-group"><label>沟通内容</label><textarea id="c_summary" placeholder="沟通的主要内容"></textarea></div>

}

function addComm(idx){
  const s = allStudents[idx];
  const record = {
    date: document.getElementById('c_date').value,
    method: document.getElementById('c_method').value,
    mood: document.getElementById('c_mood').value,
    summary: document.getElementById('c_summary').value.trim(),
    demand: document.getElementById('c_demand').value.trim(),
    person: document.getElementById('c_person').value.trim(),
    nextAction: document.getElementById('c_next_action').value.trim()
  };
  s.communications.push(record);
  s.communications.sort((a,b)=> new Date(b.date) - new Date(a.date));
  saveData();
  hideModal();
  showToast('✅ 沟通记录已添加');
  renderSidebar();
  buildAdminPanel();
  showProfile(idx);
}

// ===== 数据导出 =====
function exportData(){
  const dataStr = JSON.stringify(allStudents, null, 2);
  const blob = new Blob([dataStr], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = '维多教育_学生档案_' + new Date().toISOString().split('T')[0] + '.json';
  a.click();
  URL.revokeObjectURL(url);
  showToast('✅ 数据已导出');
  safeSetItem('weiduo_last_export_at', String(Date.now()), {silent: true, description: '上次导出时间'});
}

// ===== 数据备份 =====
function backupData(){
  const backup = {
    version: '2.0',
    date: new Date().toISOString(),
    data: allStudents
  };
  const key = 'weiduo_backup_' + new Date().toISOString().split('T')[0];
  safeSetItem(key, JSON.stringify(backup), { silent: false, description: "每日备份" });
  showToast('✅ 备份完成：' + key);
  // 同时导出文件
  exportData();
}

// ===== 批量导入 =====
function showImportModal(){
  showModal(`
    <h3>📤 批量导入数据</h3>
    <div class="import-area" onclick="document.getElementById('importFile').click()">
      <div style="font-size:32px;margin-bottom:8px">📁</div>
      <div style="font-size:14px;color:var(--sub)">点击选择 JSON 文件</div>
      <div style="font-size:12px;color:#ccc;margin-top:4px">支持从系统导出的 JSON 格式</div>
      <input type="file" id="importFile" accept=".json" onchange="handleImport(event)">
    </div>
    <div id="importPreview" style="margin-top:16px"></div>
    <div class="btn-row" style="margin-top:16px">
      <button class="admin-btn" onclick="hideModal()">取消</button>
    </div>
  `);
}

function handleImport(event){
  const file = event.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(e){
    try {
      const data = JSON.parse(e.target.result);
      const students = (Array.isArray(data) ? data : (data.data || [])).map(normalizeStudent);
      if(!students.length){ showToast('文件中没有学生数据'); return; }
      
      document.getElementById('importPreview').innerHTML = `
        <div style="font-size:13px;color:var(--navy);margin-bottom:8px">📋 识别到 ${students.length} 名学生：</div>
        <div style="max-height:200px;overflow-y:auto;font-size:12px">
          ${students.map(s=>`<div style="padding:4px 0">${s.name} · ${s.grade} · ${s.archiveCode||'无编号'}</div>`).join('')}
        </div>
        <div style="margin-top:12px">
          <label style="font-size:12px;color:var(--sub)"><input type="radio" name="importMode" value="merge" checked> 合并（保留现有数据，添加新学生）</label><br>
          <label style="font-size:12px;color:var(--sub)"><input type="radio" name="importMode" value="replace"> 替换（清除现有数据，全部替换）</label>
        </div>
        <div style="margin-top:12px;text-align:right">
          <button class="admin-btn primary" onclick="doImport()">确认导入</button>
        </div>
      `;
      // 存储待导入数据
      window._importData = students;
    } catch(err){
      showToast('文件格式错误，请选择有效的 JSON 文件');
    }
  };
  reader.readAsText(file);
}

function doImport(){
  const students = (window._importData || []).map(normalizeStudent);
  if(!students.length) return;
  const mode = document.querySelector('input[name="importMode"]:checked').value;
  
  if(mode === 'replace'){
    if(!confirm('替换模式将清除所有现有数据，确定继续？')) return;
    if(!confirm('请再次确认：将以导入数据完全替换现有数据，是否继续？')) return;
    allStudents = students;
  } else {
    // 合并：按 archiveCode 去重
    const existingCodes = new Set(allStudents.map(s=>s.archiveCode));
    students.forEach(s=>{
      if(!existingCodes.has(s.archiveCode)){
        allStudents.push(s);
      }
    });
  }
  
  saveData();
  hideModal();
  showToast('✅ 导入完成，共 ' + allStudents.length + ' 名学生');
  renderSidebar();
  buildAdminPanel();
}
