<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>学生私人订制档案 · 西安维多教育</title>
<script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--navy:#1A2B4E;--gold:#C8A951;--blue:#1565C0;--light:#F5F7FA;--border:#E0E0E0;--text:#333;--sub:#777;--green:#2E7D32;--orange:#E65100;--purple:#6A1B9A;--teal:#00838F;--red:#C62828}
body{font-family:'PingFang SC','Microsoft YaHei','Helvetica Neue',Arial,sans-serif;background:var(--light);color:var(--text);min-height:100vh}

/* ===== 登录页 ===== */
.login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#1A2B4E 0%,#2C3E6B 50%,#1A2B4E 100%);position:relative;overflow:hidden}
.login-page::before{content:'';position:absolute;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(200,169,81,0.08),transparent 70%);top:-200px;right:-100px}
.login-page::after{content:'';position:absolute;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(200,169,81,0.05),transparent 70%);bottom:-100px;left:-50px}
.login-box{background:#fff;border-radius:16px;padding:48px 40px;width:420px;max-width:90vw;box-shadow:0 20px 60px rgba(0,0,0,.3);position:relative;z-index:1}
.login-box .brand{text-align:center;margin-bottom:32px}
.login-box .brand h1{font-size:22px;color:var(--navy);letter-spacing:2px}
.login-box .brand .sub{font-size:12px;color:var(--gold);margin-top:6px;letter-spacing:3px}
.login-box .brand .school{font-size:13px;color:var(--sub);margin-top:12px}
.login-box .divider{height:1px;background:linear-gradient(90deg,transparent,var(--border),transparent);margin:24px 0}
.login-box .lock-icon{text-align:center;font-size:40px;margin-bottom:16px}
.login-box .hint{text-align:center;font-size:14px;color:var(--sub);margin-bottom:24px;line-height:1.8}
.login-box .input-group{margin-bottom:20px}
.login-box .input-group label{display:block;font-size:12px;color:#999;margin-bottom:6px;letter-spacing:1px}
.login-box .input-group input,.login-box .input-group select{width:100%;padding:14px 16px;border:2px solid var(--border);border-radius:8px;font-size:16px;letter-spacing:4px;text-align:center;transition:border-color .2s;outline:none;font-family:inherit}
.login-box .input-group input:focus,.login-box .input-group select:focus{border-color:var(--gold)}
.login-box .btn-login{width:100%;padding:14px;background:linear-gradient(135deg,var(--navy),#2C3E6B);color:#fff;border:none;border-radius:8px;font-size:15px;cursor:pointer;letter-spacing:2px;transition:transform .1s,box-shadow .2s;font-family:inherit}
.login-box .btn-login:hover{box-shadow:0 4px 16px rgba(26,43,78,.4)}
.login-box .btn-login:active{transform:scale(0.98)}
.login-box .error-msg{text-align:center;color:var(--red);font-size:13px;margin-top:12px;min-height:20px}
.login-box .footer-text{text-align:center;font-size:11px;color:#ccc;margin-top:24px}
.login-mode-tabs{display:flex;margin-bottom:24px;border-radius:8px;overflow:hidden;border:1px solid var(--border)}
.login-mode-tab{flex:1;padding:10px;text-align:center;font-size:13px;cursor:pointer;background:var(--light);color:var(--sub);transition:all .2s;border:none;font-family:inherit}
.login-mode-tab.active{background:var(--navy);color:#fff;font-weight:600}

/* ===== 管理页 ===== */
.admin-page{display:none}
.admin-toggle{position:fixed;bottom:20px;right:20px;z-index:200;background:var(--navy);color:var(--gold);border:2px solid var(--gold);border-radius:50%;width:44px;height:44px;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.2);transition:transform .2s}
.admin-toggle:hover{transform:scale(1.1)}
.admin-panel{position:fixed;bottom:74px;right:20px;z-index:200;background:#fff;border-radius:12px;padding:24px;width:400px;max-width:90vw;box-shadow:0 8px 32px rgba(0,0,0,.15);display:none;max-height:70vh;overflow-y:auto}
.admin-panel.show{display:block}
.admin-panel h3{font-size:15px;color:var(--navy);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.admin-panel .close-btn{position:absolute;top:12px;right:16px;background:none;border:none;font-size:18px;cursor:pointer;color:#999}
.admin-section{margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--border)}
.admin-section:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.admin-section h4{font-size:13px;color:var(--navy);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.admin-btn{display:inline-flex;align-items:center;gap:4px;padding:8px 16px;border-radius:6px;font-size:12px;cursor:pointer;border:1px solid var(--border);background:#fff;color:var(--text);transition:all .2s;font-family:inherit}
.admin-btn:hover{background:var(--light);border-color:var(--navy)}
.admin-btn.primary{background:var(--navy);color:#fff;border-color:var(--navy)}
.admin-btn.primary:hover{background:#2C3E6B}
.admin-btn.danger{background:#fff;color:var(--red);border-color:var(--red)}
.admin-btn.danger:hover{background:#FFEBEE}
.admin-btn-row{display:flex;gap:8px;flex-wrap:wrap}
.qr-item{display:flex;align-items:center;gap:16px;padding:12px;background:var(--light);border-radius:8px;margin-bottom:12px}
.qr-item .qr-code{flex-shrink:0}
.qr-item .qr-info{font-size:13px}
.qr-item .qr-info .name{font-weight:600;color:var(--navy);font-size:14px}
.qr-item .qr-info .code{color:var(--gold);font-family:monospace;font-size:15px;letter-spacing:2px;margin-top:4px}
.qr-item .qr-info .tip{color:var(--sub);font-size:11px;margin-top:4px}

/* ===== 档案页面 ===== */
.top-bar{background:var(--navy);color:#fff;padding:12px 32px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.top-bar .logo{display:flex;align-items:center;gap:12px}
.top-bar .logo h1{font-size:18px;color:var(--gold);letter-spacing:1px}
.top-bar .logo span{font-size:12px;color:#8899BB}
.top-bar .school{font-size:13px;color:#AABBCC}
.top-bar .btn-logout{background:none;border:1px solid rgba(255,255,255,.3);color:#AABBCC;padding:4px 12px;border-radius:4px;cursor:pointer;font-size:12px;font-family:inherit}
.top-bar .btn-logout:hover{border-color:var(--gold);color:var(--gold)}
.container{display:flex;min-height:calc(100vh - 52px)}
.sidebar{width:260px;background:#fff;border-right:1px solid var(--border);padding:0;flex-shrink:0;display:flex;flex-direction:column}
.sidebar-header{padding:16px 20px;border-bottom:1px solid var(--border)}
.sidebar-header .search-box{display:flex;gap:8px}
.sidebar-header .search-box input{flex:1;padding:8px 12px;border:1px solid var(--border);border-radius:6px;font-size:13px;outline:none;font-family:inherit}
.sidebar-header .search-box input:focus{border-color:var(--gold)}
.sidebar-header .search-box button{padding:8px 12px;background:var(--navy);color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:12px;white-space:nowrap;font-family:inherit}
.sidebar-list{flex:1;overflow-y:auto}
.sidebar .section-title{font-size:11px;color:#999;padding:16px 20px 8px;text-transform:uppercase;letter-spacing:2px}
.sidebar .student-card{padding:14px 20px;cursor:pointer;border-left:4px solid transparent;transition:all .2s;display:flex;align-items:center;gap:12px}
.sidebar .student-card:hover{background:var(--light)}
.sidebar .student-card.active{background:#E8EDF5;border-left-color:var(--gold)}
.sidebar .student-card .avatar-sm{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;color:#fff;font-weight:700;flex-shrink:0}
.sidebar .student-card .avatar-sm.female{background:linear-gradient(135deg,#E91E63,#9C27B0)}
.sidebar .student-card .avatar-sm.male{background:linear-gradient(135deg,#1565C0,#0D47A1)}
.sidebar .student-card .info-wrap{flex:1;min-width:0}
.sidebar .student-card .name{font-size:14px;font-weight:600;color:var(--navy);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sidebar .student-card .meta{font-size:11px;color:var(--sub);margin-top:2px}
.sidebar .student-card .comm-warn{font-size:10px;color:var(--red);margin-top:3px;font-weight:500}
.sidebar .student-card .comm-ok{font-size:10px;color:var(--green);margin-top:3px}
.sidebar-add{padding:12px 20px;border-top:1px solid var(--border)}
.sidebar-add button{width:100%;padding:8px;background:none;border:1px dashed var(--border);border-radius:6px;color:var(--sub);cursor:pointer;font-size:12px;font-family:inherit;transition:all .2s}
.sidebar-add button:hover{border-color:var(--gold);color:var(--gold);background:#FFFDE7}
.main{flex:1;padding:28px 36px;overflow-y:auto;max-height:calc(100vh - 52px)}
.welcome{text-align:center;padding:80px 0}
.welcome h2{font-size:28px;color:var(--navy);margin-bottom:12px}
.welcome p{color:var(--sub);font-size:15px}
.profile-header{display:flex;align-items:center;gap:24px;background:#fff;border-radius:12px;padding:28px 32px;margin-bottom:28px;box-shadow:0 1px 4px rgba(0,0,0,.06);flex-wrap:wrap;position:relative}
.avatar{width:72px;height:72px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;color:#fff;font-weight:700;flex-shrink:0}
.avatar.female{background:linear-gradient(135deg,#E91E63,#9C27B0)}
.avatar.male{background:linear-gradient(135deg,#1565C0,#0D47A1)}
.profile-header .details h2{font-size:22px;color:var(--navy)}
.profile-header .details .meta{display:flex;gap:16px;margin-top:8px;font-size:13px;color:var(--sub);flex-wrap:wrap}
.profile-header .details .meta span{display:flex;align-items:center;gap:4px}
.archive-badge{display:inline-flex;align-items:center;gap:6px;background:linear-gradient(135deg,#FFFDE7,#FFF8E1);border:1px solid var(--gold);border-radius:20px;padding:6px 16px;font-size:12px;color:#8D6E00;font-weight:600;letter-spacing:1px}
.archive-badge .code{font-family:'Courier New',monospace;font-size:14px;color:var(--navy)}
.btn-edit{position:absolute;top:16px;right:16px;padding:6px 14px;background:var(--navy);color:#fff;border:none;border-radius:6px;font-size:12px;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:4px}
.btn-edit:hover{background:#2C3E6B}
.tabs{display:flex;gap:4px;margin-bottom:24px;background:#fff;border-radius:8px;padding:4px;box-shadow:0 1px 3px rgba(0,0,0,.05);flex-wrap:wrap}
.tab{padding:10px 18px;border-radius:6px;cursor:pointer;font-size:13px;color:var(--sub);transition:all .2s;white-space:nowrap}
.tab:hover{color:var(--navy);background:var(--light)}
.tab.active{background:var(--navy);color:#fff;font-weight:600}
.tab-content{display:none}
.tab-content.active{display:block}
.card{background:#fff;border-radius:10px;padding:24px 28px;margin-bottom:20px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.card h3{font-size:15px;color:var(--navy);margin-bottom:16px;display:flex;align-items:center;gap:8px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.card h3 .icon{font-size:18px}
.info-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px}
.info-item .label{font-size:11px;color:#999;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.info-item .value{font-size:14px;color:var(--text);font-weight:500}
.info-item .value.empty{color:#ccc;font-style:italic}
.tag{display:inline-block;padding:3px 10px;border-radius:12px;font-size:12px;font-weight:500}
.tag.blue{background:#E3F2FD;color:#1565C0}
.tag.green{background:#E8F5E9;color:#2E7D32}
.tag.orange{background:#FFF3E0;color:#E65100}
.tag.purple{background:#F3E5F5;color:#6A1B9A}
.tag.red{background:#FFEBEE;color:#C62828}
.tag.teal{background:#E0F7FA;color:#00838F}
.tag.gold{background:#FFFDE7;color:#F57F17}
.score-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:12px;margin:16px 0}
.score-box{text-align:center;padding:16px 8px;border-radius:8px;background:var(--light)}
.score-box .subject{font-size:11px;color:var(--sub);margin-bottom:6px}
.score-box .score{font-size:22px;font-weight:700}
.score-box .score.low{color:var(--red)}
.score-box .score.mid{color:var(--orange)}
.score-box .score.high{color:var(--green)}
.score-box .unit{font-size:11px;color:#999}
.weakness-list{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.timeline{position:relative;padding-left:28px}
.timeline::before{content:'';position:absolute;left:8px;top:0;bottom:0;width:2px;background:var(--border)}
.timeline-item{position:relative;margin-bottom:24px}
.timeline-item::before{content:'';position:absolute;left:-24px;top:4px;width:12px;height:12px;border-radius:50%;border:2px solid var(--gold);background:#fff}
.timeline-item .date{font-size:12px;color:var(--sub);margin-bottom:4px}
.timeline-item .content{background:var(--light);border-radius:8px;padding:14px 18px}
.timeline-item .content .title{font-size:14px;font-weight:600;color:var(--navy);margin-bottom:6px}
.timeline-item .content .desc{font-size:13px;color:var(--sub);line-height:1.6}
.goal-steps{display:flex;gap:0;margin:16px 0;align-items:stretch}
.goal-step{flex:1;text-align:center;padding:18px 12px;position:relative;background:var(--light)}
.goal-step:first-child{border-radius:8px 0 0 8px}
.goal-step:last-child{border-radius:0 8px 8px 0}
.goal-step .period{font-size:11px;color:var(--sub);margin-bottom:6px}
.goal-step .target{font-size:16px;font-weight:700;color:var(--navy)}
.goal-step .desc{font-size:12px;color:var(--sub);margin-top:4px}
.goal-step+.goal-step{border-left:2px solid #ddd}
.goal-step .arrow{position:absolute;right:-8px;top:50%;transform:translateY(-50%);z-index:1;color:var(--gold);font-size:14px}
.comm-card{border-left:4px solid var(--teal);background:var(--light);border-radius:0 8px 8px 0;padding:16px 20px;margin-bottom:16px}
.comm-card .date{font-size:12px;color:var(--sub)}
.comm-card .method{font-size:12px;margin-top:4px}
.comm-card .summary{font-size:14px;margin-top:8px;color:var(--text);line-height:1.6}
.comm-card .demand{font-size:13px;color:var(--orange);margin-top:8px;font-weight:500}
.honor-card{display:flex;gap:16px;align-items:flex-start;padding:16px;background:var(--light);border-radius:8px;margin-bottom:12px}
.honor-card .honor-icon{font-size:32px;flex-shrink:0}
.honor-card .honor-info .type{font-weight:600;color:var(--navy)}
.honor-card .honor-info .detail{font-size:13px;color:var(--sub);margin-top:4px;line-height:1.5}
.honor-card .honor-info .progress{font-size:12px;color:var(--green);margin-top:4px;font-weight:500}
.footer{text-align:center;padding:24px;color:#ccc;font-size:11px}

/* ===== 编辑弹窗 ===== */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:500;display:none;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:#fff;border-radius:12px;width:600px;max-width:95vw;max-height:85vh;overflow-y:auto;padding:28px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.modal h3{font-size:16px;color:var(--navy);margin-bottom:20px;display:flex;align-items:center;gap:8px}
.modal .form-group{margin-bottom:16px}
.modal .form-group label{display:block;font-size:12px;color:#999;margin-bottom:4px}
.modal .form-group input,.modal .form-group select,.modal .form-group textarea{width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:6px;font-size:14px;outline:none;font-family:inherit}
.modal .form-group input:focus,.modal .form-group select:focus,.modal .form-group textarea:focus{border-color:var(--gold)}
.modal .form-group textarea{min-height:60px;resize:vertical}
.modal .form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.modal .btn-row{display:flex;gap:12px;justify-content:flex-end;margin-top:20px}

/* ===== 提示条 ===== */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;padding:12px 24px;border-radius:8px;font-size:13px;z-index:999;box-shadow:0 4px 16px rgba(0,0,0,.2);opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}

/* ===== 统计面板 ===== */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;margin-bottom:20px}
.stat-box{background:#fff;border-radius:10px;padding:18px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.stat-box .stat-num{font-size:28px;font-weight:700;color:var(--navy)}
.stat-box .stat-label{font-size:11px;color:var(--sub);margin-top:4px;letter-spacing:1px}

/* ===== 导入导出 ===== */
.import-area{border:2px dashed var(--border);border-radius:8px;padding:24px;text-align:center;cursor:pointer;transition:all .2s}
.import-area:hover{border-color:var(--gold);background:#FFFDE7}
.import-area input{display:none}

@media(max-width:768px){
.container{flex-direction:column}
.sidebar{width:100%;max-height:200px;display:flex;flex-direction:column}
.sidebar-list{display:flex;overflow-x:auto;overflow-y:hidden}
.sidebar .section-title{display:none}
.sidebar .student-card{border-left:none;border-bottom:3px solid transparent;white-space:nowrap}
.sidebar .student-card.active{border-bottom-color:var(--gold)}
.main{padding:16px}
.profile-header{flex-direction:column;text-align:center}
.info-grid{grid-template-columns:1fr}
.goal-steps{flex-direction:column}
.goal-step+.goal-step{border-left:none;border-top:2px solid #ddd}
.goal-step .arrow{display:none}
.tabs{overflow-x:auto}
.login-box{padding:32px 24px}
.modal{width:95vw;padding:20px}
.modal .form-row{grid-template-columns:1fr}
.admin-panel{width:95vw;right:2.5vw}
}
</style>
</head>
<body>

<!-- ===== 提示条 ===== -->
<div class="toast" id="toast"></div>

<!-- ===== 登录页 ===== -->
<div class="login-page" id="loginPage">
  <div class="login-box">
    <div class="brand">
      <h1>私人订制档案</h1>
      <div class="sub">PERSONALIZED PROFILE</div>
      <div class="school">西安维多教育 · 曲江校区</div>
    </div>
    <div class="divider"></div>
    <div class="lock-icon">🔒</div>
    <!-- 登录模式切换 -->
    <div class="login-mode-tabs">
      <button class="login-mode-tab active" onclick="switchLoginMode('code')">家长/老师查询</button>
      <button class="login-mode-tab" onclick="switchLoginMode('admin')">管理员登录</button>
    </div>
    <!-- 编号查询模式 -->
    <div id="codeLoginMode">
      <div class="hint">请输入学生的档案编号查看专属档案<br><span style="font-size:12px;color:#aaa">档案编号由学校统一发放，一人一码</span></div>
      <div class="input-group">
        <label>档案编号</label>
        <input type="text" id="archiveCode" placeholder="请输入档案编号" maxlength="10" autocomplete="off">
      </div>
      <button class="btn-login" onclick="doLogin()">查 看 档 案</button>
    </div>
    <!-- 管理员登录模式 -->
    <div id="adminLoginMode" style="display:none">
      <div class="hint">管理员登录后可查看全部学生档案<br><span style="font-size:12px;color:#aaa">支持增删改、导入导出、统计分析</span></div>
      <div class="input-group">
        <label>管理密码</label>
        <input type="password" id="adminPassword" placeholder="请输入管理密码" autocomplete="off" style="letter-spacing:2px">
      </div>
      <button class="btn-login" onclick="doAdminLogin()">管 理 登 录</button>
    </div>
    <div class="error-msg" id="errorMsg"></div>
    <div class="footer-text">© 2026 西安维多教育 · 一人一档 · 私人订制</div>
  </div>
</div>

<!-- ===== 管理面板按钮 ===== -->
<button class="admin-toggle" id="adminToggle" onclick="toggleAdmin()" style="display:none" title="管理面板">⚙️</button>
<div class="admin-panel" id="adminPanel">
  <button class="close-btn" onclick="toggleAdmin()">✕</button>
  <h3>⚙️ 管理面板</h3>
  
  <div class="admin-section">
    <h4>🖨️ 二维码管理</h4>
    <div id="qrList"></div>
  </div>
  
  <div class="admin-section">
    <h4>📊 数据统计</h4>
    <div class="stats-grid" id="adminStats"></div>
  </div>
  
  <div class="admin-section">
    <h4>💾 数据管理</h4>
    <div class="admin-btn-row">
      <button class="admin-btn primary" onclick="exportData()">📥 导出全部数据</button>
      <button class="admin-btn" onclick="showImportModal()">📤 批量导入</button>

// ===== 登录逻辑 =====
function switchLoginMode(mode){
  document.querySelectorAll('.login-mode-tab').forEach(t=>t.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('codeLoginMode').style.display = mode==='code'?'block':'none';
  document.getElementById('adminLoginMode').style.display = mode==='admin'?'block':'none';
  document.getElementById('errorMsg').textContent = '';
}

function doLogin(){
  const code = document.getElementById('archiveCode').value.trim().toUpperCase();
  const errEl = document.getElementById('errorMsg');
  if(!code){ errEl.textContent='请输入档案编号'; return; }
  const student = allStudents.find(s => s.archiveCode === code);
  if(!student){ errEl.textContent='档案编号不存在，请核对后重试'; return; }
  errEl.textContent='';
  currentStudent = student;
  isAdmin = false;
  showProfilePage();
}

function doAdminLogin(){
  const pwd = document.getElementById('adminPassword').value;
  const errEl = document.getElementById('errorMsg');
  if(pwd === ADMIN_PASSWORD){
    isAdmin = true;
    currentStudent = null;
    errEl.textContent='';
    showProfilePage();
  } else {
    errEl.textContent='密码错误';
  }
}

function doLogout(){
  currentStudent = null;
  isAdmin = false;
  document.getElementById('profilePage').style.display='none';
  document.getElementById('adminToggle').style.display='none';
  document.getElementById('loginPage').style.display='flex';
  document.getElementById('archiveCode').value='';
  document.getElementById('adminPassword').value='';
  document.getElementById('errorMsg').textContent='';
}

// 回车登录
document.addEventListener('keydown', function(e){
  if(e.key==='Enter' && document.getElementById('loginPage').style.display!=='none'){
    if(document.getElementById('codeLoginMode').style.display!=='none') doLogin();
    else doAdminLogin();
  }
});

  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  if(code){

  }
  if(params.get('admin') === '1'){

  }
}

}

}

function buildQRList(){
  const container = document.getElementById('qrList');
  let html = '';
  allStudents.forEach(s => {
    const url = BASE_URL + '?code=' + s.archiveCode;
    try {
      const qr = qrcode(0, 'M');
      qr.addData(url);
      qr.make();
      const qrSvg = qr.createSvgTag({cellSize:3, margin:2});
      html += `
        <div class="qr-item">
          <div class="qr-code">${qrSvg}</div>
          <div class="qr-info">
            <div class="name">${s.name}</div>
            <div class="code">档案编号：${s.archiveCode}</div>
            <div class="tip">家长扫码后输入编号即可查看</div>
          </div>
        </div>`;
    } catch(e){
      html += `
        <div class="qr-item">
          <div class="qr-info">
            <div class="name">${s.name}</div>
            <div class="code">档案编号：${s.archiveCode}</div>
          </div>
        </div>`;
    }
  });
  container.innerHTML = html;
}

function buildStats(){
  const container = document.getElementById('adminStats');
  const total = allStudents.length;
  const grades = {};
  allStudents.forEach(s => { grades[s.grade] = (grades[s.grade]||0) + 1; });
  const now = new Date();
  let warnCount = 0;
  allStudents.forEach(s => {
    const lastComm = s.communications.length > 0 ? s.communications[s.communications.length-1] : null;
    const days = lastComm ? Math.floor((now - new Date(lastComm.date)) / 86400000) : 999;
    if(days > COMM_WARN_DAYS) warnCount++;
  });
  
  let gradeHtml = Object.entries(grades).map(([g,c])=>`<div class="stat-box"><div class="stat-num">${c}</div><div class="stat-label">${g}</div></div>`).join('');
  
  container.innerHTML = `
    <div class="stat-box"><div class="stat-num">${total}</div><div class="stat-label">在读学员</div></div>
    ${gradeHtml}
    <div class="stat-box"><div class="stat-num" style="color:var(--red)">${warnCount}</div><div class="stat-label">需跟进沟通</div></div>
  `;
}

function buildCommWarnings(){
  const container = document.getElementById('commWarnings');
  const now = new Date();
  let html = '';
  allStudents.forEach(s => {
    const lastComm = s.communications.length > 0 ? s.communications[s.communications.length-1] : null;
    const days = lastComm ? Math.floor((now - new Date(lastComm.date)) / 86400000) : 999;
    if(days > COMM_WARN_DAYS){
      html += `<div style="font-size:12px;padding:6px 8px;background:#FFEBEE;border-radius:4px;margin-bottom:6px;color:var(--red)">
        🔔 ${s.name}：${lastComm ? days+'天未沟通' : '从未沟通'}（上次：${lastComm ? lastComm.date : '无'}）
      </div>`;
    }
  });
  if(!html) html = '<div style="font-size:12px;color:var(--green)">✅ 所有学生近期均已沟通</div>';
  container.innerHTML = html;
}

// ===== 搜索 =====
function filterStudents(){
  const kw = document.getElementById('searchInput').value.trim().toLowerCase();
  renderSidebar(kw);
}

// ===== 侧边栏 =====
function renderSidebar(keyword=''){
  const list = document.getElementById('sidebarList');
  list.innerHTML = '';
  const kw = keyword.toLowerCase();
  allStudents.forEach((s,i)=>{
    if(kw && !s.name.toLowerCase().includes(kw) && !s.archiveCode.toLowerCase().includes(kw) && !s.grade.toLowerCase().includes(kw) && !s.school.toLowerCase().includes(kw)){
      return;
    }
    const now = new Date();
    const lastComm = s.communications.length > 0 ? s.communications[s.communications.length-1] : null;
    const commDays = lastComm ? Math.floor((now - new Date(lastComm.date)) / 86400000) : 999;
    
    const card = document.createElement('div');
    card.className = 'student-card';
    card.dataset.index = i;
    card.innerHTML = `
      <div class="avatar-sm ${s.gender==='女'?'female':'male'}">${s.name[0]}</div>
      <div class="info-wrap">
        <div class="name">${s.name}</div>
        <div class="meta">${s.school} · ${s.grade}</div>
        ${commDays > COMM_WARN_DAYS ? `<div class="comm-warn">🔔 ${commDays>=999?'从未沟通':commDays+'天未沟通'}</div>` : `<div class="comm-ok">✓ 近期已沟通</div>`}
      </div>
    `;
    card.onclick = ()=> showProfile(i);
    list.appendChild(card);
  });
}

function renderTrendChart(s){
  const container = document.getElementById('trendChart');
  if(!container || s.growth.length < 2) {
    if(container) container.innerHTML = '<div style="text-align:center;color:#999;padding:20px;font-size:13px">需要2次以上记录才能生成趋势图</div>';
    return;
  }
  const allSubjects = new Set();
  s.growth.forEach(g=> Object.keys(g.scores).forEach(k=> allSubjects.add(k)));
  let html = '<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:12px">';
  html += '<tr style="background:var(--navy);color:#fff"><th style="padding:8px 12px">日期</th><th style="padding:8px 8px">类型</th>';
  allSubjects.forEach(sub=> html+=`<th style="padding:8px 8px">${sub}</th>`);
  html += '</tr>';
  s.growth.forEach((g,i)=>{
    const bg = i%2===0?'#fff':'var(--light)';
    html += `<tr style="background:${bg}">`;
    html += `<td style="padding:8px 12px;text-align:center">${g.date}</td>`;
    html += `<td style="padding:8px 8px;text-align:center">${g.type}</td>`;
    allSubjects.forEach(sub=>{
      const v = g.scores[sub];
      if(v!==undefined && v!==null){
        html+=`<td style="padding:8px 8px;text-align:center;font-weight:600;color:${scoreClass(v)==='high'?'var(--green)':scoreClass(v)==='mid'?'var(--orange)':'var(--red)'}">${v}</td>`;
      } else {
        html+=`<td style="padding:8px 8px;text-align:center;color:#ccc">-</td>`;
      }
    });
    html += '</tr>';
  });
  if(s.growth.length>=2){
    const first = s.growth[0], last = s.growth[s.growth.length-1];
    html += '<tr style="background:#FFFDE7;font-weight:600"><td colspan="2" style="padding:8px 12px;text-align:center">📈 变化</td>';
    allSubjects.forEach(sub=>{
      const fv = first.scores[sub], lv = last.scores[sub];
      if(fv!==undefined && lv!==undefined){
        const diff = (lv-fv).toFixed(1);
        const color = diff>0?'var(--green)':diff<0?'var(--red)':'#999';
        html+=`<td style="padding:8px 8px;text-align:center;color:${color}">${diff>0?'+':''}${diff}</td>`;
      } else {
        html+=`<td style="padding:8px 8px;text-align:center;color:#ccc">-</td>`;
      }
    });
    html += '</tr>';
  }
  html += '</table></div>';
  container.innerHTML = html;
}

function switchTab(el, tabId){
  el.parentElement.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  document.getElementById(tabId).classList.add('active');
}

  const subjects = Object.keys(s.diagnosis.scores).length > 0 ? Object.keys(s.diagnosis.scores) : ['语文','数学','英语'];
  const scores = {};
  subjects.forEach(sub=>{

  });
  
  const record = {
    date: document.getElementById('g_date').value,
    type: document.getElementById('g_type').value.trim() || '考试',
    scores: scores,
    performance: document.getElementById('g_perf').value,
    comment: document.getElementById('g_comment').value.trim(),
    parentFeedback: document.getElementById('g_feedback').value.trim()
  };
  
  s.growth.push(record);
  // 按日期排序
  s.growth.sort((a,b)=> new Date(a.date) - new Date(b.date));
  saveData();
  hideModal();
  showToast('✅ 成长记录已添加');

    </div>

    <div class="form-group"><label>进步描述</label><input id="h_progress" placeholder="如：从XX分提升到XX分"></div>
    <div class="form-row">
      <div class="form-group"><label>记录老师</label><input id="h_teacher" placeholder="记录老师姓名"></div>
      <div class="form-group"><label>家长反馈</label><input id="h_pfeedback" placeholder="家长的反馈"></div>
    </div>
    <div class="btn-row">
      <button class="admin-btn" onclick="hideModal()">取消</button>
      <button class="admin-btn primary" onclick="addHonor(${idx})">添加记录</button>
    </div>
  `);
}

function addHonor(idx){
  const s = allStudents[idx];
  const record = {
    date: document.getElementById('h_date').value,
    type: document.getElementById('h_type').value,
    content: document.getElementById('h_content').value.trim(),
    progress: document.getElementById('h_progress').value.trim(),
    teacher: document.getElementById('h_teacher').value.trim(),
    parentFeedback: document.getElementById('h_pfeedback').value.trim()
  };
  s.honors.push(record);
  saveData();
  hideModal();
  showToast('✅ 荣誉记录已添加');
  showProfile(idx);
}

// ===== 数据导出 =====
function exportData(){
  const dataStr = JSON.stringify(allStudents, null, 2);
  const blob = new Blob([dataStr], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = '维多教育_学生档案_' + new Date().toISOString().split('T')[0] + '.json';
  a.click();
  URL.revokeObjectURL(url);
  showToast('✅ 数据已导出');
}

// ===== 数据备份 =====
function backupData(){
  const backup = {
    version: '2.0',
    date: new Date().toISOString(),
    data: allStudents
  };
  const key = 'weiduo_backup_' + new Date().toISOString().split('T')[0];
  localStorage.setItem(key, JSON.stringify(backup));
  showToast('✅ 备份完成：' + key);
  // 同时导出文件
  exportData();
}

// ===== 批量导入 =====
function showImportModal(){
  showModal(`
    <h3>📤 批量导入数据</h3>
    <div class="import-area" onclick="document.getElementById('importFile').click()">
      <div style="font-size:32px;margin-bottom:8px">📁</div>
      <div style="font-size:14px;color:var(--sub)">点击选择 JSON 文件</div>
      <div style="font-size:12px;color:#ccc;margin-top:4px">支持从系统导出的 JSON 格式</div>
      <input type="file" id="importFile" accept=".json" onchange="handleImport(event)">
    </div>
    <div id="importPreview" style="margin-top:16px"></div>
    <div class="btn-row" style="margin-top:16px">
      <button class="admin-btn" onclick="hideModal()">取消</button>
    </div>
  `);
}

function handleImport(event){
  const file = event.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(e){
    try {
      const data = JSON.parse(e.target.result);
      const students = Array.isArray(data) ? data : (data.data || []);
      if(!students.length){ showToast('文件中没有学生数据'); return; }
      
      document.getElementById('importPreview').innerHTML = `
        <div style="font-size:13px;color:var(--navy);margin-bottom:8px">📋 识别到 ${students.length} 名学生：</div>
        <div style="max-height:200px;overflow-y:auto;font-size:12px">
          ${students.map(s=>`<div style="padding:4px 0">${s.name} · ${s.grade} · ${s.archiveCode||'无编号'}</div>`).join('')}
        </div>
        <div style="margin-top:12px">
          <label style="font-size:12px;color:var(--sub)"><input type="radio" name="importMode" value="merge" checked> 合并（保留现有数据，添加新学生）</label><br>
          <label style="font-size:12px;color:var(--sub)"><input type="radio" name="importMode" value="replace"> 替换（清除现有数据，全部替换）</label>
        </div>
        <div style="margin-top:12px;text-align:right">
          <button class="admin-btn primary" onclick="doImport()">确认导入</button>
        </div>
      `;
      // 存储待导入数据
      window._importData = students;
    } catch(err){
      showToast('文件格式错误，请选择有效的 JSON 文件');
    }
  };
  reader.readAsText(file);
}

function doImport(){
  const students = window._importData;
  if(!students) return;
  const mode = document.querySelector('input[name="importMode"]:checked').value;
  
  if(mode === 'replace'){
    if(!confirm('替换模式将清除所有现有数据，确定继续？')) return;
    allStudents = students;
  } else {
    // 合并：按 archiveCode 去重
    const existingCodes = new Set(allStudents.map(s=>s.archiveCode));
    students.forEach(s=>{
      if(!existingCodes.has(s.archiveCode)){
        allStudents.push(s);
      }
    });
  }
  
  saveData();
  hideModal();
  showToast('✅ 导入完成，共 ' + allStudents.length + ' 名学生');
  renderSidebar();
  buildAdminPanel();
}

// ===== 点击弹窗外部关闭 =====
document.getElementById('modalOverlay').addEventListener('click', function(e){
  if(e.target === this) hideModal();
});

// ===== 初始化 =====
loadData();
checkUrlParams();
</script>
</body>
</html>
